<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>{title}</title>
  <style>
    * {
      padding: 0;
      margin: 0;
    }

    body {
      height: 100%;
      width: 100%;
      text-align: center;
    }

    #unity-canvas {
      position: absolute;
      left: 0px;
      top: 0px;
      width: 100%;
      height: 100%;
    }

    #unity-loading-bar {
      position: absolute;
      left: 30%;
      top: 50%;
      width: 40%;
      height: 10px;
      background-color: #fff;
      border: 1px solid #ccc;
      border-radius: 10px;
    }

    #unity-progress-bar {
      position: absolute;
      left: 0%;
      top: 0%;
      width: 1%;
      height: 100%;
      background-color: #ccc;
      border-radius: 10px;
      transition: 400ms linear;
    }
  </style>
  <!-- <link rel="stylesheet" href="patch/unity2021/debug-console.css"> -->
</head>

<body>
  <!-- <script src="patch/unity2021/debug-console.js"></script> -->
  <canvas id="unity-canvas"></canvas>
  <div id="unity-loading-bar">
    <div id="unity-progress-bar">
    </div>
  </div>    
  <script src="patch/js/crazygames-sdk-v1.js"></script>
  <script src="patch/js/crazygames-sdk-v2.js"></script>
  <script src="patch/unity2021/unity2021-loader.js"></script>
  <script>
    const maxPixelRatioMobile = 2.0;
    const maxPixelRatioDesktop = 1.5;

    var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    var maxDevicePixelRatio = isMobile? maxPixelRatioMobile: maxPixelRatioDesktop;
    var pixelRatio = Math.min(window.devicePixelRatio, maxDevicePixelRatio);

    var loaderUrl = "patch/unity2021/unity2021-loader.js";
    var config = {
      dataUrl: "{data_url}",
      frameworkUrl: "{framework_url}",
      codeUrl: "{code_url}",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Games235",
      productName: "{title}",
      productVersion: "0.0.108",
      devicePixelRatio: pixelRatio
    };

    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBar = document.querySelector("#unity-progress-bar");

    var unityGame; // This can be used to access the application with .SendMessage() commands
    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = function() {
      createUnityInstance(canvas, config, function(progress) {
        progressBar.style.width = 100 * progress + "%";
      }).then(function(unityInstance) {
        unityGame = unityInstance;
        loadingBar.style.display = "none";
      }).catch(function(message) {
        alert(message);
      });
    };
    document.body.appendChild(script);
  </script>

<!-- SYSTEM_INJECTED_AD_BLOCKER -->
<script>
(function(){
    // 1. Block window.open
    const originalOpen = window.open;
    window.open = function(url, windowName, windowFeatures) {
        console.log('Blocked popup to:', url);
        return null; // Prevent opening
    };

    // 2. Block external link clicks
    document.addEventListener('click', function(e) {
        let target = e.target;
        while(target && target.tagName !== 'A') {
            target = target.parentNode;
        }
        if(target && target.tagName === 'A' && target.href) {
            // Allow our injected ad link
            if(target.className.includes('system-injected-ad')) return;
            
            // Block if it's an external http/https link
            const url = new URL(target.href, window.location.href);
            if(url.protocol.startsWith('http') && url.hostname !== window.location.hostname) {
                e.preventDefault();
                e.stopPropagation();
                console.log('Blocked external link to:', target.href);
            }
        }
    }, true); // use capture phase to catch event early
})();
</script>

</html>
