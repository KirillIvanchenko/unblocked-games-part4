<script>
(function(){
    // 1. Block window.open
    const originalOpen = window.open;
    window.open = function(url, windowName, windowFeatures) {
        console.log('Blocked popup to:', url);
        return null; // Prevent opening
    };

    // 2. Block external link clicks
    document.addEventListener('click', function(e) {
        let target = e.target;
        while(target && target.tagName !== 'A') {
            target = target.parentNode;
        }
        if(target && target.tagName === 'A' && target.href) {
            // Allow our injected ad link
            if(target.className.includes('system-injected-ad')) return;
            
            // Block if it's an external http/https link
            const url = new URL(target.href, window.location.href);
            if(url.protocol.startsWith('http') && url.hostname !== window.location.hostname) {
                e.preventDefault();
                e.stopPropagation();
                console.log('Blocked external link to:', target.href);
            }
        }
    }, true); // use capture phase to catch event early
})();
</script>
